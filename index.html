<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuadrantes de Seguridad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .cuadrante-card { transition: transform 0.2s; }
        .cuadrante-card:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div class="max-w-md mx-auto p-4">
        <header class="text-center mb-6">
            <h1 class="text-2xl font-bold text-green-800">VIGILANCIA POR CUADRANTES</h1>
            <p class="text-sm text-gray-600">Acceso rápido a emergencias</p>
        </header>

        <a href="tel:3113978374" class="block bg-red-600 text-white text-center py-4 rounded-xl mb-6 shadow-lg pulse-animation">
            <span class="block text-xs uppercase font-bold">Línea de Emergencia</span>
            <span class="text-2xl font-black">311 397 8374</span>
        </a>

        <div class="mb-6">
            <input type="text" id="searchInput" placeholder="Busca tu barrio..." 
                   class="w-full p-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-green-500 outline-none">
        </div>

        <div id="cuadrantesList" class="space-y-4">
            </div>
    </div>

    <script>
        const cuadrantes = [
            { id: 1, color: "bg-orange-900", tel: "3148446209", barrios: "Camello 1-2, Santa Elena, Los Almendros, La 10, El Palmar, Villa Uribe, Nueva Santa Elena, San José, Pedro Valdivia, El Bosque, Las Villas, Santo Domingo, Barrio Lora" },
            { id: 2, color: "bg-green-600", tel: "3148447487", barrios: "Asovivienda, El Triángulo, La Sudestación, Fiestas del Lago, Centro, Colinas del Portal, Buenos Aires 1-2, El Mar, Los Trabajadores, Altos de San Juan" },
            { id: 3, color: "bg-blue-800", tel: "3148451116", barrios: "Kennedy, Loma Fresca, El Ferry, Villa Granada, Centro, El Carmen, El Águila, Las Vegas" },
            { id: 4, color: "bg-orange-500", tel: "3136295815", barrios: "Pueblo Nuevo, La Playa, La Victoria, Clemente Arrieta, Nueva Estrella" },
            { id: 5, color: "bg-pink-600", tel: "3147707291", barrios: "La Esperanza, 1 de Mayo, El Poblado, La Carbonera, Villa Javier 1-2, El Castillo, Parcelas de Caracolí, La Paz, El Prado, El Roble, Las Malvinas" },
            { id: 6, color: "bg-purple-600", tel: "3114536529", barrios: "El Paraíso, Las Brisas, Carmen Granzón, Los Comuneros" },
            { id: 7, color: "bg-red-700", tel: "3136402443", barrios: "Cementerio, San Rafael 1-2, Pajonal" }
        ];

        function render(filter = "") {
            const list = document.getElementById('cuadrantesList');
            list.innerHTML = "";
            
            const filtered = cuadrantes.filter(c => 
                c.barrios.toLowerCase().includes(filter.toLowerCase())
            );

            filtered.forEach(c => {
                const card = `
                    <div class="cuadrante-card bg-white rounded-xl shadow-md overflow-hidden border-l-8 ${c.color.replace('bg-', 'border-')}">
                        <div class="p-4 flex justify-between items-center">
                            <div class="flex-1">
                                <h3 class="font-bold text-gray-800">CUADRANTE N-${c.id}</h3>
                                <p class="text-xs text-gray-500 truncate w-48">${c.barrios}</p>
                            </div>
                            <a href="tel:${c.tel}" class="${c.color} text-white px-4 py-2 rounded-lg font-bold text-sm">
                                LLAMAR
                            </a>
                        </div>
                    </div>
                `;
                list.innerHTML += card;
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => render(e.target.value));
        render();
    </script>
</body>
</html>
